<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-xl font-bold mb-4">Voice Input</h1>

    <!-- タブ -->
    <div class="flex gap-2 mb-4">
      <button id="tab-main" onclick="switchTab('main')"
        class="px-4 py-2 rounded bg-blue-600 text-white font-medium">メイン</button>
      <button id="tab-history" onclick="switchTab('history')"
        class="px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium">履歴</button>
    </div>

    <!-- ステータスバー -->
    <div class="flex items-center justify-between bg-gray-800 rounded p-3 mb-4">
      <div class="flex items-center gap-3">
        <span class="text-sm">校正:</span>
        <button id="correction-toggle" onclick="toggleCorrection()"
          class="px-3 py-1 rounded text-sm font-medium bg-green-600">ON</button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-sm">録音:</span>
        <span id="rec-indicator" class="inline-block w-3 h-3 rounded-full bg-gray-500"></span>
        <span id="rec-label" class="text-sm text-gray-400">停止中</span>
      </div>
    </div>

    <!-- メインタブ: セッション表示 -->
    <div id="panel-main">
      <div id="segments" class="space-y-1 font-mono text-sm min-h-[200px]">
        <p class="text-gray-500">待機中...</p>
      </div>
    </div>

    <!-- 履歴タブ -->
    <div id="panel-history" class="hidden">
      <div id="history-list" class="space-y-3">
        <p class="text-gray-500">読み込み中...</p>
      </div>
    </div>
  </div>

<script>
function switchTab(tab) {
  const mainBtn = document.getElementById('tab-main');
  const histBtn = document.getElementById('tab-history');
  const mainPanel = document.getElementById('panel-main');
  const histPanel = document.getElementById('panel-history');

  if (tab === 'main') {
    mainBtn.className = 'px-4 py-2 rounded bg-blue-600 text-white font-medium';
    histBtn.className = 'px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium';
    mainPanel.classList.remove('hidden');
    histPanel.classList.add('hidden');
  } else {
    histBtn.className = 'px-4 py-2 rounded bg-blue-600 text-white font-medium';
    mainBtn.className = 'px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium';
    histPanel.classList.remove('hidden');
    mainPanel.classList.add('hidden');
    loadHistory();
  }
}

async function toggleCorrection() {
  const res = await fetch('/api/correction-toggle', { method: 'POST' });
  const data = await res.json();
  updateCorrectionUI(data.correction_enabled);
}

function updateCorrectionUI(enabled) {
  const btn = document.getElementById('correction-toggle');
  if (enabled) {
    btn.textContent = 'ON';
    btn.className = 'px-3 py-1 rounded text-sm font-medium bg-green-600';
  } else {
    btn.textContent = 'OFF';
    btn.className = 'px-3 py-1 rounded text-sm font-medium bg-gray-600';
  }
}

function updateRecordingUI(recording) {
  const indicator = document.getElementById('rec-indicator');
  const label = document.getElementById('rec-label');
  if (recording) {
    indicator.className = 'inline-block w-3 h-3 rounded-full bg-red-500 animate-pulse';
    label.textContent = '録音中';
    label.className = 'text-sm text-red-400';
  } else {
    indicator.className = 'inline-block w-3 h-3 rounded-full bg-gray-500';
    label.textContent = '停止中';
    label.className = 'text-sm text-gray-400';
  }
}

// --- SSE ---
const segments = {};
let sessionActive = false;

function renderSegments() {
  const container = document.getElementById('segments');
  const keys = Object.keys(segments);
  if (keys.length === 0) {
    container.innerHTML = '<p class="text-gray-500">待機中...</p>';
    return;
  }
  const correctedIds = keys.filter(k => k !== 'interim').map(Number).sort((a, b) => a - b);
  let html = correctedIds.map(id => {
    const seg = segments[id];
    return `<p class="text-green-400">${escapeHtml(seg.text)} <span class="text-xs">&#10003;</span></p>`;
  }).join('');
  if (segments['interim']) {
    html += `<p class="text-gray-400">${escapeHtml(segments['interim'].text)} <span class="text-xs">[認識中]</span></p>`;
  }
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function connectSSE() {
  const evtSource = new EventSource('/events');

  evtSource.addEventListener('interim', (e) => {
    const data = JSON.parse(e.data);
    segments['interim'] = { status: 'interim', text: data.text };
    renderSegments();
  });

  evtSource.addEventListener('corrected', (e) => {
    const data = JSON.parse(e.data);
    delete segments['interim'];
    segments[data.segment_id] = { status: 'corrected', text: data.text };
    renderSegments();
  });

  evtSource.addEventListener('status', (e) => {
    const data = JSON.parse(e.data);
    updateRecordingUI(data.recording);
    if (data.recording && !sessionActive) {
      // 新セッション開始 → 表示リセット
      Object.keys(segments).forEach(k => delete segments[k]);
      renderSegments();
      sessionActive = true;
    }
    if (!data.recording) {
      sessionActive = false;
    }
  });

  evtSource.addEventListener('session_end', () => {
    delete segments['interim'];
    renderSegments();
  });

  evtSource.addEventListener('error', (e) => {
    const data = JSON.parse(e.data);
    const container = document.getElementById('segments');
    const errorDiv = document.createElement('p');
    errorDiv.className = 'text-red-400 text-sm';
    errorDiv.textContent = data.message;
    container.appendChild(errorDiv);
  });

  evtSource.onerror = () => {
    evtSource.close();
    setTimeout(connectSSE, 3000);
  };
}

async function loadHistory() {
  const container = document.getElementById('history-list');
  try {
    const res = await fetch('/api/history');
    const sessions = await res.json();
    if (sessions.length === 0) {
      container.innerHTML = '<p class="text-gray-500">履歴はありません</p>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const dt = new Date(s.started_at).toLocaleString('ja-JP');
      const mode = s.correction_enabled ? '校正ON' : '校正OFF';
      return `<div class="bg-gray-800 rounded p-3">
        <div class="text-xs text-gray-400 mb-1">${escapeHtml(dt)} (${mode})</div>
        <div class="text-sm">${escapeHtml(s.text)}</div>
      </div>`;
    }).join('');
  } catch {
    container.innerHTML = '<p class="text-gray-500">履歴の読み込みに失敗しました</p>';
  }
}

// 初期化
(async () => {
  const res = await fetch('/api/correction-status');
  const data = await res.json();
  updateCorrectionUI(data.correction_enabled);
  connectSSE();
})();
</script>
</body>
</html>
