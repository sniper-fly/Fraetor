<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-xl font-bold mb-4">Voice Input</h1>

    <!-- タブ -->
    <div class="flex gap-2 mb-4">
      <button id="tab-main" onclick="switchTab('main')"
        class="px-4 py-2 rounded bg-blue-600 text-white font-medium">メイン</button>
      <button id="tab-history" onclick="switchTab('history')"
        class="px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium">履歴</button>
    </div>

    <!-- ステータスバー -->
    <div class="flex items-center justify-between bg-gray-800 rounded p-3 mb-4">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-sm">録音:</span>
          <span id="rec-indicator" class="inline-block w-3 h-3 rounded-full bg-gray-500"></span>
          <span id="rec-label" class="text-sm text-gray-400">停止中</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-sm">校正:</span>
          <button id="proofread-toggle" onclick="toggleProofread()"
            class="px-2 py-0.5 rounded text-xs font-medium bg-green-600 text-white">ON</button>
        </div>
      </div>
      <button id="btn-shutdown" onclick="shutdownServer()"
        class="px-2 py-1 rounded bg-gray-700 hover:bg-red-700 text-gray-300 hover:text-white text-sm transition-colors"
        title="サーバーを停止">&#x23FB;</button>
    </div>

    <!-- メインタブ: セッション表示 -->
    <div id="panel-main">
      <div id="editor-mode">
        <textarea id="editor-textarea"
          class="w-full bg-gray-800 text-gray-100 font-mono text-sm p-3 rounded-t border border-gray-700 focus:outline-none focus:border-blue-500 resize-y"
          rows="8" placeholder="待機中..."></textarea>
        <div id="editor-interim"
          class="bg-gray-800 border border-t-0 border-gray-700 rounded-b p-3 min-h-[2rem] font-mono text-sm text-gray-400">
        </div>
      </div>
    </div>

    <!-- 履歴タブ -->
    <div id="panel-history" class="hidden">
      <div id="history-list" class="space-y-3">
        <p class="text-gray-500">読み込み中...</p>
      </div>
    </div>
  </div>

<script>
function switchTab(tab) {
  const mainBtn = document.getElementById('tab-main');
  const histBtn = document.getElementById('tab-history');
  const mainPanel = document.getElementById('panel-main');
  const histPanel = document.getElementById('panel-history');

  if (tab === 'main') {
    mainBtn.className = 'px-4 py-2 rounded bg-blue-600 text-white font-medium';
    histBtn.className = 'px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium';
    mainPanel.classList.remove('hidden');
    histPanel.classList.add('hidden');
  } else {
    histBtn.className = 'px-4 py-2 rounded bg-blue-600 text-white font-medium';
    mainBtn.className = 'px-4 py-2 rounded bg-gray-700 text-gray-300 font-medium';
    histPanel.classList.remove('hidden');
    mainPanel.classList.add('hidden');
    loadHistory();
  }
}

function updateRecordingUI(recording) {
  const indicator = document.getElementById('rec-indicator');
  const label = document.getElementById('rec-label');
  const shutdownBtn = document.getElementById('btn-shutdown');
  if (recording) {
    indicator.className = 'inline-block w-3 h-3 rounded-full bg-red-500 animate-pulse';
    label.textContent = '録音中';
    label.className = 'text-sm text-red-400';
    shutdownBtn.disabled = true;
    shutdownBtn.className = 'px-2 py-1 rounded bg-gray-700 text-gray-500 text-sm opacity-50 cursor-not-allowed';
  } else {
    indicator.className = 'inline-block w-3 h-3 rounded-full bg-gray-500';
    label.textContent = '停止中';
    label.className = 'text-sm text-gray-400';
    shutdownBtn.disabled = false;
    shutdownBtn.className = 'px-2 py-1 rounded bg-gray-700 hover:bg-red-700 text-gray-300 hover:text-white text-sm transition-colors';
  }
}

async function shutdownServer() {
  if (!confirm('サーバーを停止しますか？')) return;
  const btn = document.getElementById('btn-shutdown');
  btn.disabled = true;
  btn.textContent = '停止中...';
  btn.className = 'px-2 py-1 rounded bg-red-700 text-white text-sm cursor-not-allowed';
  serverShuttingDown = true;
  try {
    await fetch('/api/shutdown', { method: 'POST' });
  } catch {
    // サーバーが既に停止している場合
  }
}

// --- SSE ---
let sessionActive = false;
let serverShuttingDown = false;

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function appendToTextarea(text) {
  const textarea = document.getElementById('editor-textarea');
  const startPos = textarea.selectionStart;
  const endPos = textarea.selectionEnd;
  const currentLen = textarea.value.length;
  textarea.value += text;
  // カーソルが末尾にあった場合は末尾に追従、そうでなければ元の位置を保持
  if (startPos === currentLen) {
    textarea.selectionStart = textarea.value.length;
    textarea.selectionEnd = textarea.value.length;
  } else {
    textarea.selectionStart = startPos;
    textarea.selectionEnd = endPos;
  }
}

function updateEditorInterim(text) {
  const interim = document.getElementById('editor-interim');
  if (text) {
    interim.innerHTML = `${escapeHtml(text)} <span class="text-xs">[認識中]</span>`;
  } else {
    interim.innerHTML = '';
  }
}

async function finalizeSession() {
  const textarea = document.getElementById('editor-textarea');
  const text = textarea.value;
  await fetch('/api/finalize-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
}

function connectSSE() {
  const evtSource = new EventSource('/events');

  evtSource.addEventListener('interim', (e) => {
    const data = JSON.parse(e.data);
    updateEditorInterim(data.text);
  });

  evtSource.addEventListener('recognized', (e) => {
    const data = JSON.parse(e.data);
    appendToTextarea(data.text);
    updateEditorInterim('');
  });

  evtSource.addEventListener('status', (e) => {
    const data = JSON.parse(e.data);
    updateRecordingUI(data.recording);
    if (data.recording && !sessionActive) {
      // 新セッション開始 → 表示リセット
      document.getElementById('editor-textarea').value = '';
      updateEditorInterim('');
      sessionActive = true;
    }
    if (!data.recording) {
      sessionActive = false;
    }
  });

  evtSource.addEventListener('session_end', async (e) => {
    updateEditorInterim('');
    if (isProofreadEnabled()) {
      const textarea = document.getElementById('editor-textarea');
      const text = textarea.value;
      if (text.trim()) {
        updateEditorInterim('校正中...');
        try {
          const res = await fetch('/api/proofread', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          });
          const data = await res.json();
          textarea.value = data.text;
        } catch {
          // 校正失敗時は元テキストのまま
        }
        updateEditorInterim('');
      }
    }
    finalizeSession();
  });

  evtSource.addEventListener('error', (e) => {
    const data = JSON.parse(e.data);
    const container = document.getElementById('editor-mode');
    const errorDiv = document.createElement('p');
    errorDiv.className = 'text-red-400 text-sm';
    errorDiv.textContent = data.message;
    container.appendChild(errorDiv);
  });

  evtSource.addEventListener('shutdown', () => {
    serverShuttingDown = true;
    evtSource.close();
    document.body.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-gray-900"><p class="text-gray-400 text-lg">サーバーが停止しました</p></div>';
  });

  evtSource.onerror = () => {
    evtSource.close();
    if (!serverShuttingDown) {
      setTimeout(connectSSE, 3000);
    }
  };
}

async function loadHistory() {
  const container = document.getElementById('history-list');
  try {
    const res = await fetch('/api/history');
    const sessions = await res.json();
    if (sessions.length === 0) {
      container.innerHTML = '<p class="text-gray-500">履歴はありません</p>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const dt = new Date(s.started_at).toLocaleString('ja-JP');
      return `<div class="bg-gray-800 rounded p-3">
        <div class="flex justify-between items-start">
          <div class="text-xs text-gray-400 mb-1">${escapeHtml(dt)}</div>
          <button onclick="deleteHistory('${escapeHtml(s.id)}')"
            class="text-gray-500 hover:text-red-400 text-xs ml-2 shrink-0">削除</button>
        </div>
        <div class="text-sm">${escapeHtml(s.text)}</div>
      </div>`;
    }).join('');
  } catch {
    container.innerHTML = '<p class="text-gray-500">履歴の読み込みに失敗しました</p>';
  }
}

async function deleteHistory(sessionId) {
  try {
    const res = await fetch(`/api/history/${sessionId}`, { method: 'DELETE' });
    if (res.ok) {
      loadHistory();
    }
  } catch {
    // ネットワークエラー時は何もしない
  }
}

// --- 校正トグル ---
function isProofreadEnabled() {
  return localStorage.getItem('proofreadEnabled') !== 'false';
}

function toggleProofread() {
  const enabled = !isProofreadEnabled();
  localStorage.setItem('proofreadEnabled', enabled ? 'true' : 'false');
  updateProofreadUI(enabled);
}

function updateProofreadUI(enabled) {
  const btn = document.getElementById('proofread-toggle');
  if (enabled) {
    btn.textContent = 'ON';
    btn.className = 'px-2 py-0.5 rounded text-xs font-medium bg-green-600 text-white';
  } else {
    btn.textContent = 'OFF';
    btn.className = 'px-2 py-0.5 rounded text-xs font-medium bg-gray-600 text-gray-300';
  }
}

// 初期化
updateProofreadUI(isProofreadEnabled());
connectSSE();
</script>
</body>
</html>
